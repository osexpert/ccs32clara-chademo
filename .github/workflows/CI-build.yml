name: CI
on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'doc/**'
      - 'volts/**'
      - 'add_d2_relay/**'
      - '.github/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'doc/**'
      - 'volts/**'
      - 'add_d2_relay/**'
      - '.github/**'
jobs:
  build:
    name: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build package dependencies
        run: |
          sudo apt-get update
          sudo apt-get install gcc-arm-none-eabi
      - name: Build dependencies
        run: |
          echo "Number of processors:" `nproc`
          make get-deps -j `nproc`
      - name: Set build date
        id: set_date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      # --- Default build — the only one that's actually compiled ---
      - name: Build default firmware
        run: |
          make clean all
      - uses: actions/upload-artifact@v4
        with:
          name: ccs32clara-chademo-${{ steps.set_date.outputs.date }}-${{ github.run_number }}
          path: My407ccs2chademo.bin

      # --- AV1 / V2X / V2X-AO / SX: patched from the root binary into their own
      # subfolder via config.js, so the root file is never overwritten and each
      # variant always reads the same untouched source. upload-artifact strips
      # the subfolder for a single-file path, so the zip still contains
      # My407ccs2chademo.bin at its root. ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch AV1 variant
        run: node config.js My407ccs2chademo.bin configs.json AV1 av1/My407ccs2chademo.bin
      - uses: actions/upload-artifact@v4
        with:
          name: ccs32clara-chademo-${{ steps.set_date.outputs.date }}-${{ github.run_number }}-AV1
          path: av1/My407ccs2chademo.bin

      - name: Patch V2X variant
        run: node config.js My407ccs2chademo.bin configs.json V2X v2x/My407ccs2chademo.bin
      - uses: actions/upload-artifact@v4
        with:
          name: ccs32clara-chademo-${{ steps.set_date.outputs.date }}-${{ github.run_number }}-V2X
          path: v2x/My407ccs2chademo.bin

      - name: Patch V2X-AO variant
        run: node config.js My407ccs2chademo.bin configs.json V2X-AO v2x-ao/My407ccs2chademo.bin
      - uses: actions/upload-artifact@v4
        with:
          name: ccs32clara-chademo-${{ steps.set_date.outputs.date }}-${{ github.run_number }}-V2X-AO
          path: v2x-ao/My407ccs2chademo.bin

      - name: Patch SX variant
        run: node config.js My407ccs2chademo.bin configs.json SX sx/My407ccs2chademo.bin
      - uses: actions/upload-artifact@v4
        with:
          name: ccs32clara-chademo-${{ steps.set_date.outputs.date }}-${{ github.run_number }}-SX
          path: sx/My407ccs2chademo.bin

      - name: Patch JDEMO variant
        run: node config.js My407ccs2chademo.bin configs.json JDEMO jdemo/My407ccs2chademo.bin
      - uses: actions/upload-artifact@v4
        with:
          name: ccs32clara-chademo-${{ steps.set_date.outputs.date }}-${{ github.run_number }}-JDEMO
          path: jdemo/My407ccs2chademo.bin

      - name: Add info to summary
        run: |
          echo "### Build tags" >> $GITHUB_STEP_SUMMARY
          echo "- **AV1**: For target voltage 410v, use nominal voltage 380v instead of 355v. AV1 should be a better match for Leaf/e-NV200 with 20-30kwh battery." >> $GITHUB_STEP_SUMMARY
          echo "- **V2X**: V2X mode permanently enabled. Should work equally well for charging, but some cars may not like it (speculation)." >> $GITHUB_STEP_SUMMARY
          echo "- **AO**: Always on. After inactivity or charging ended, do a soft restart instead of shutting down. When battery drops below 3.3V, it will power off instead. Errors and stop buttons will power off, as usual." >> $GITHUB_STEP_SUMMARY
          echo "- **SX**: Start a fake chademo charging, then wait for ccs to join. Should work better with Xpeng and Lexus." >> $GITHUB_STEP_SUMMARY
          echo "- **JDEMO**: Jdemo quirk: disable dynamic current." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY